<div class="">
    <ul ngbNav #nav="ngbNav" class="nav-pills">
        <li ngbNavItem *ngFor="let d of dashboards">
        <a ngbNavLink>{{d.header}}</a>
            <ng-template ngbNavContent>
                <iframe *ngIf="d.payload" class="mt-1"
                    onload="iFrameResize({checkOrigin: false}, this)"
                    [src]="d.payload.url"
                    frameborder="0"
                    style="width: 100%; height: 100vh"
                    allowtransparency
                ></iframe>
            </ng-template>
        </li>
    </ul>
<div [ngbNavOutlet]="nav"></div>
</div>
