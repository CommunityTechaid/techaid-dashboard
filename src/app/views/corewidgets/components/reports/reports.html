<div class="">
  <ul ngbNav #nav="ngbNav" class="nav-pills">
    @for (d of dashboards; track d) {
      <li ngbNavItem>
        <a ngbNavLink>{{d.header}}</a>
        <ng-template ngbNavContent>
          @if (d.payload) {
            <iframe class="mt-1"
              onload="iFrameResize({checkOrigin: false}, this)"
              [src]="d.payload.url"
              frameborder="0"
              style="width: 100%; height: 100vh"
              allowtransparency
            ></iframe>
          }
        </ng-template>
      </li>
    }
  </ul>
  <div [ngbNavOutlet]="nav"></div>
</div>
